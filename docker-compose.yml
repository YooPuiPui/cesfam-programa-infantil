version: '3.8'

services:
  database:
    build: 
      context: ./database
    container_name: cesfam-db-container
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-cesfam_db}
    networks:
      - cesfam-net

  backend:
    build: 
      context: ./backend
    container_name: mi-servidor-backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      - DB_HOST=database
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-admin123}
      - DB_NAME=${DB_NAME:-cesfam_db}
    depends_on:
      - database
    networks:
      - cesfam-net

  frontend:
    build: 
      context: ./frontend
    container_name: mi-servidor-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - cesfam-net

networks:
  cesfam-net:
    driver: bridge